<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sub-Admin Dashboard — OVS</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#050a14;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.1);--purple:#a855f7;--cyan:#06b6d4;--green:#22c55e;--red:#ef4444;--gold:#f59e0b;--text:#e2e8f0;--muted:#64748b;}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;}
    input,select{width:100%;padding:0.8rem 1rem;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:white;font-size:0.95rem;font-family:'Outfit',sans-serif;outline:none;transition:border 0.3s;}
    input:focus,select:focus{border-color:var(--purple);}
    select option{background:#1e293b;}
    label{display:block;color:var(--muted);font-size:0.78rem;margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.05em;}
    .btn{padding:0.75rem 1.5rem;border-radius:10px;border:none;cursor:pointer;font-size:0.95rem;font-weight:600;font-family:'Outfit',sans-serif;transition:all 0.3s;}
    .btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:white;}
    .btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:white;}
    .btn:hover{transform:translateY(-2px);opacity:0.9;}
    .btn-sm{padding:0.3rem 0.8rem;border-radius:6px;border:none;cursor:pointer;font-size:0.78rem;font-family:'Outfit',sans-serif;font-weight:600;}
    .btn-d{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
    .btn-g{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
    .btn-e{background:rgba(168,85,247,0.15);color:var(--purple);border:1px solid rgba(168,85,247,0.3);}
    .layout{display:flex;min-height:100vh;}
    .sidebar{width:230px;background:rgba(168,85,247,0.05);border-right:1px solid rgba(168,85,247,0.15);padding:1.5rem 1rem;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;}
    .brand{font-size:1.4rem;font-weight:900;color:var(--purple);margin-bottom:0.2rem;}
    .role-tag{font-size:0.75rem;color:var(--muted);margin-bottom:2rem;}
    .nav-item{padding:0.7rem 1rem;border-radius:10px;cursor:pointer;transition:all 0.2s;margin-bottom:0.25rem;font-size:0.9rem;display:flex;align-items:center;gap:0.6rem;color:var(--muted);}
    .nav-item:hover,.nav-item.active{background:rgba(168,85,247,0.1);color:var(--purple);font-weight:600;}
    .main{margin-left:230px;flex:1;padding:2rem;}
    .page{display:none;}.page.active{display:block;}
    .page-title{font-size:1.6rem;font-weight:800;margin-bottom:0.4rem;}
    .page-sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem;}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem;text-align:center;}
    .stat .num{font-size:2rem;font-weight:900;}.stat .lbl{color:var(--muted);font-size:0.78rem;margin-top:0.2rem;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
    .card h3{font-size:1rem;font-weight:700;margin-bottom:1.2rem;}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;}
    .form-field{display:flex;flex-direction:column;gap:0.3rem;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:0.7rem 0.8rem;color:var(--muted);font-size:0.75rem;text-transform:uppercase;border-bottom:1px solid var(--border);}
    td{padding:0.7rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.88rem;vertical-align:middle;}
    tr:hover td{background:rgba(255,255,255,0.02);}
    .badge{padding:0.2rem 0.6rem;border-radius:20px;font-size:0.72rem;font-weight:600;}
    .ba{background:rgba(34,197,94,0.15);color:var(--green);}
    .bp{background:rgba(245,158,11,0.15);color:var(--gold);}
    .br{background:rgba(239,68,68,0.15);color:var(--red);}
    .empty{text-align:center;color:var(--muted);padding:2rem;}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#1e293b;border:1px solid var(--border);border-radius:10px;padding:0.9rem 1.5rem;font-size:0.9rem;transform:translateY(100px);opacity:0;transition:all 0.4s;z-index:999;}
    .toast.show{transform:translateY(0);opacity:1;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#0f172a;border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:450px;position:relative;}
    .modal h3{font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;}
    .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;}
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-overlay" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(168,85,247,0.08) 0%,var(--bg) 70%)">
  <div style="background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.3);border-radius:20px;padding:3rem;width:100%;max-width:420px;text-align:center;">
    <div style="font-size:2rem;font-weight:900;color:var(--purple);margin-bottom:0.25rem;">👥 Sub-Admin</div>
    <p style="color:var(--muted);font-size:0.9rem;margin-bottom:2rem;">Class Administration Login</p>
    <div style="text-align:left;margin-bottom:1rem;"><label>Sub-Admin ID</label><input type="text" id="auth-id" placeholder="SADM-CSE5"></div>
    <div style="text-align:left;margin-bottom:1.5rem;"><label>Password</label><input type="password" id="auth-pass"></div>
    <button class="btn btn-purple" style="width:100%" onclick="saLogin()">Login</button>
    <div id="auth-err" style="color:var(--red);margin-top:1rem;font-size:0.9rem;min-height:1.2rem;"></div>
  </div>
</div>

<div class="layout" id="main-layout" style="display:none">
  <div class="sidebar">
    <div class="brand">👥 OVS</div>
    <div class="role-tag" id="class-label">Sub-Admin</div>
    <div class="nav-item active" onclick="showPage('overview')">📊 Overview</div>
    <div class="nav-item" onclick="showPage('students')">🎓 My Class</div>
    <div style="border-top:1px solid var(--border);margin-top:auto;padding-top:1rem;">
      <div class="nav-item" onclick="saLogout()" style="color:var(--red)">🚪 Logout</div>
    </div>
  </div>

  <div class="main">
    <!-- OVERVIEW -->
    <div class="page active" id="page-overview">
      <div class="page-title">📊 Class Overview</div>
      <div class="page-sub" id="class-sub">Your assigned class</div>
      <div class="stats-grid">
        <div class="stat"><div class="num" id="s-students" style="color:var(--purple)">-</div><div class="lbl">Students</div></div>
        <div class="stat"><div class="num" id="s-canvote" style="color:var(--green)">-</div><div class="lbl">Can Vote</div></div>
        <div class="stat"><div class="num" id="s-voted" style="color:var(--gold)">-</div><div class="lbl">Voted</div></div>
        <div class="stat"><div class="num" id="s-not-granted" style="color:var(--red)">-</div><div class="lbl">Not Yet Granted</div></div>
      </div>
    </div>

    <!-- MY CLASS STUDENTS -->
    <div class="page" id="page-students">
      <div class="page-title">🎓 My Class Students</div>
      <div class="page-sub" id="class-students-sub">Students you are responsible for</div>
      <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
        <input style="flex:1;min-width:200px;padding:0.7rem 1rem;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:white;font-family:'Outfit',sans-serif;outline:none;" placeholder="🔍 Search..." oninput="filterStudents(this.value)">
        <button class="btn btn-green" onclick="grantAll()">✅ Grant All Vote Access</button>
      </div>
      <div class="card" style="padding:0.5rem">
        <table><thead><tr><th>Reg No</th><th>Name</th><th>Can Vote</th><th>Voted</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="student-table"></tbody></table>
      </div>
    </div>
  </div>
</div>

<!-- EDIT STUDENT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <h3>✏️ Edit Student Details</h3>
    <input type="hidden" id="edit-regnum">
    <div class="form-field" style="margin-bottom:1rem;"><label>Full Name</label><input type="text" id="edit-name"></div>
    <div class="form-field" style="margin-bottom:1rem;"><label>Email</label><input type="email" id="edit-email"></div>
    <button class="btn btn-purple" onclick="saveEdit()">Save Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const API = (location.hostname === 'localhost' ? 'http://localhost:3001' : '') + '/api';
let session = JSON.parse(localStorage.getItem('ovs_currentUser') || "null");
let classStudents = [];

document.addEventListener('DOMContentLoaded', () => {
  if (session && session.role === 'subadmin') {
    document.getElementById('auth-overlay').style.display='none';
    document.getElementById('main-layout').style.display='flex';
    document.getElementById('class-label').textContent=`Class: ${session.class||'-'}`;
    document.getElementById('class-sub').textContent=`Managing ${session.class} — ${session.branch} — ${session.institution}`;
    document.getElementById('class-students-sub').textContent=`Students in ${session.class}`;
    loadAll();
  }
});

async function apiFetch(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||r.statusText);}
  return r.json();
}
function toast(msg,ok=true){const t=document.getElementById('toast');t.textContent=(ok?'✅ ':'❌ ')+msg;t.style.borderColor=ok?'rgba(34,197,94,0.5)':'rgba(239,68,68,0.5)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

async function saLogin(){
  const id=document.getElementById('auth-id').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-err');
  err.textContent='';
  try{
    const user=await apiFetch(`/users/${id}`);
    if(user.role!=='subadmin') throw new Error('Not a Sub-Admin account.');
    if(user.status!=='active') throw new Error('Account is not active.');
    if(user.password!==pass&&user.password!==btoa(pass)) throw new Error('Wrong password.');
    localStorage.setItem('ovs_currentUser', JSON.stringify(user));
    session=user;
    document.getElementById('auth-overlay').style.display='none';
    document.getElementById('main-layout').style.display='flex';
    document.getElementById('class-label').textContent=`Class: ${user.class||'-'}`;
    document.getElementById('class-sub').textContent=`Managing ${user.class} — ${user.branch} — ${user.institution}`;
    document.getElementById('class-students-sub').textContent=`Students in ${user.class}`;
    loadAll();
  }catch(e){err.textContent=e.message;}
}
function saLogout(){
  session=null;
  localStorage.removeItem('ovs_currentUser');
  window.location.href='login.html?admin=true';
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id==='students') renderStudents(classStudents);
}

async function loadAll(){
  try{
    const students=await apiFetch(`/voters/by-class/${encodeURIComponent(session.class)}`);
    classStudents=students;
    document.getElementById('s-students').textContent=students.length;
    document.getElementById('s-canvote').textContent=students.filter(s=>s.canVote==1).length;
    document.getElementById('s-voted').textContent=students.filter(s=>s.hasVoted==1).length;
    document.getElementById('s-not-granted').textContent=students.filter(s=>s.canVote!=1).length;
    renderStudents(students);
  }catch(e){toast(e.message,false);}
}

function renderStudents(list){
  const tb=document.getElementById('student-table');
  if(!list.length){tb.innerHTML='<tr><td colspan="6" class="empty">No students in your class</td></tr>';return;}
  tb.innerHTML=list.map(s=>`<tr>
    <td><strong>${s.regNum}</strong></td><td>${s.name}</td>
    <td>${s.canVote==1?'<span class="badge ba">✅ Yes</span>':'<span class="badge bp">❌ No</span>'}</td>
    <td>${s.hasVoted==1?'<span class="badge ba">Voted</span>':'<span class="badge">No</span>'}</td>
    <td><span class="badge ${s.status==='active'?'ba':s.status==='pending'?'bp':'br'}">${s.status}</span></td>
    <td style="display:flex;gap:0.4rem;flex-wrap:wrap;min-width:200px;">
      ${s.status==='pending' ? `<button class="btn-sm btn-g" onclick="acceptStudent('${s.regNum}')">Accept</button>` : ''}
      <button class="btn-sm btn-e" onclick="openEdit('${s.regNum}','${s.name}','${s.email||''}')">Edit</button>
      <button class="btn-sm ${s.canVote==1?'btn-d':'btn-g'}" onclick="toggleVote('${s.regNum}',${s.canVote==1?0:1})">${s.canVote==1?'Revoke Vote':'Grant Vote'}</button>
      <button class="btn-sm btn-d" onclick="removeStudent('${s.regNum}')">Remove</button>
    </td>
  </tr>`).join('');
}

async function acceptStudent(id) {
  try {
    await apiFetch(`/users/${id}`, { method:'PATCH', body:JSON.stringify({ status: 'active' }) });
    toast(`Registration accepted for ${id}`);
    loadAll();
  } catch(e) { toast(e.message, false); }
}

function filterStudents(q){renderStudents(classStudents.filter(s=>[s.regNum,s.name].join(' ').toLowerCase().includes(q.toLowerCase())));}

async function grantAll(){
  if(!confirm('Grant vote access to ALL students in your class?')) return;
  try{
    await apiFetch('/voters/can-vote-bulk',{method:'POST',body:JSON.stringify({regNums:classStudents.map(s=>s.regNum),canVote:true})});
    toast('Vote granted to all!');loadAll();
  }catch(e){toast(e.message,false);}
}

async function toggleVote(regNum,val){
  try{await apiFetch('/voters/can-vote',{method:'POST',body:JSON.stringify({regNum,canVote:val})});toast(val?'Vote granted!':'Vote revoked');loadAll();}
  catch(e){toast(e.message,false);}
}

async function removeStudent(id){
  if(!confirm(`Remove student ${id}?`)) return;
  try{await apiFetch(`/users/${id}`,{method:'DELETE'});toast(`${id} removed`);loadAll();}
  catch(e){toast(e.message,false);}
}

function openEdit(id,name,email){
  document.getElementById('edit-regnum').value=id;
  document.getElementById('edit-name').value=name;
  document.getElementById('edit-email').value=email;
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');}

async function saveEdit(){
  const id=document.getElementById('edit-regnum').value;
  const name=document.getElementById('edit-name').value.trim();
  const email=document.getElementById('edit-email').value.trim();
  if(!name) return toast('Name cannot be empty',false);
  try{
    await apiFetch(`/users/${id}`,{method:'PATCH',body:JSON.stringify({name,email})});
    toast('Student details updated!');closeEdit();loadAll();
  }catch(e){toast(e.message,false);}
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('auth-overlay').style.display!=='none')saLogin();});
</script>
</body>
</html>
